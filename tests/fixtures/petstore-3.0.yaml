# A small 3.0 spec exercising the main conversions
openapi: "3.0.3"
info:
  title: Petstore
  version: 1.0.0
paths:
  /pets:
    get:
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            nullable: true
            minimum: 0
            exclusiveMinimum: true
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pet"
components:
  schemas:
    Pet:
      type: object
      properties:
        name:
          type: string
          example: Rex
        photo:
          type: string
          format: byte
